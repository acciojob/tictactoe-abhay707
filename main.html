<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

	<div class="container">
		<div id="players">
			<h1>Tic Tac Toe</h1>	
			<div class="players-id">
				<div class="player-1">
					<label for="player1">Player 1</label>
					<input id = "player1" type="text" placeholder="enter name" required> 
				</div>
				<div class="player-2">
					<label for="player2">Player 2</label>
					<input id ="player2" type="text" placeholder="enter name" required> 
				</div>
			</div>
			<button type='submit' id="submit">Start Game</button>
		</div>
		<div id="board-game" style = "display:none">
			<h1>TIC TAC TOE</h1>
			<div class="message"></div>
			<div class="board">
				<div id = "1"></div>
				<div id = "2"></div>
				<div id = "3"></div>
				<div id = "4"></div>
				<div id = "5"></div>
				<div id = "6"></div>
				<div id = "7"></div>
				<div id = "8"></div>
				<div id = "9"></div>
			</div>
		</div>
		
	</div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
